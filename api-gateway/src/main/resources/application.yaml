server:
  port: 9090

spring:
  main:
    web-application-type: reactive
  application:
    name: api-gateway
  cloud:
    config:
      enabled: false
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
springdoc:
  swagger-ui:
    urls:
      - name: ms-order
        url: /orders/v3/api-docs
      - name: ms-product
        url: /products/v3/api-docs
      - name: ms-payment
        url: /payments/v3/api-docs