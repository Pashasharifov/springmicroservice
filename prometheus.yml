global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'ms-order'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['ms-order:8081']

  - job_name: 'ms-product'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['ms-product:8083']

  - job_name: 'ms-payment'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['ms-payment:8082']

  - job_name: 'ms-auth'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['ms-auth:8084']

  - job_name: 'api-gateway'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['api-gateway:9090']